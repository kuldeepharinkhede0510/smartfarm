{% extends "base.html" %}
{% block content %}
<h2>Recent Analyses</h2>

<table class="uploads-table">
  <tr><th>ID</th><th>Image</th><th>Crop</th><th>Disease</th><th>Time</th><th>Action</th></tr>
  {% for row in uploads %}
  <tr>
    <td>{{ row[0] }}</td>
    <td><img src="{{ url_for('uploaded_file', filename=row[1]) }}" class="thumb"></td>
    <td>{{ row[2] }}</td>
    <td>{{ row[3] }}</td>
    <td>{{ row[4] }}</td>
    <td><a class="btn" href="{{ url_for('result', id=row[0]) }}">View</a></td>
  </tr>
  {% endfor %}
</table>

<hr>
<h3>Live Sensor Dashboard</h3>
<div class="cards">
  <div class="card">
    <h4>Temperature</h4>
    <canvas id="tempChart"></canvas>
  </div>
  <div class="card">
    <h4>Soil Moisture</h4>
    <canvas id="moistureChart"></canvas>
  </div>
  <div class="card">
    <h4>Pest Level</h4>
    <canvas id="pestChart"></canvas>
  </div>
</div>

{% endblock %}
